<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>8C神經外科病房-5號車</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#F5F0FF;font-family:'Noto Sans TC','PingFang TC',system-ui,sans-serif;padding:16px;color:#2D2A4A;}
    input,button,select{font-family:inherit;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse2{0%,100%{opacity:1}50%{opacity:0.4}}
  </style>
</head>
<body>
<div id="root" style="padding:30px; text-align:center; color:#9E9AB5; font-size:15px; font-weight:bold;">網頁載入中，若長時間維持此畫面請重新整理...</div>

<script>
const { useState, useEffect } = React;
const e = React.createElement;

const GAS_URL = "https://script.google.com/macros/s/AKfycbw7zsykFlp7zcyIxCP5iieN7v-82SsDEkbYPNGT1z7W7wQsyDq5rfgK5d_CfgyrGI5T/exec";
const STORAGE_KEY = "ward_check_records_8c_v5";

function loadRecords() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; }
  catch { return []; }
}
function saveRecords(recs) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(recs)); } catch {}
}

// 自動生成 37 床床號清單（去除 4, 14 房）
function generateBedsList() {
  const beds = [];
  const threeBedRooms = [1, 2, 20, 21];
  const singleBedRooms = [3, 5, 6, 17, 18, 19, 22];
  
  // 巡迴 1 到 22 房
  for (let r = 1; r <= 22; r++) {
    if (r === 4 || r === 14) continue; // 去除 4 和 14 房
    
    if (threeBedRooms.includes(r)) {
      beds.push(`8C${r}-1`, `8C${r}-2`, `8C${r}-3`);
    } else if (singleBedRooms.includes(r)) {
      beds.push(`8C${r}`);
    } else {
      beds.push(`8C${r}-1`, `8C${r}-2`);
    }
  }
  return beds;
}
const BEDS_LIST = generateBedsList();

// 所有常態項目的嚴格防呆設定
const FIXED_ITEMS_CONFIG = [
  { id: "dressing_scissors", label: "敷料剪", icon: "✂️", expected: 1 },
  { id: "ipad_count",        label: "iPad", icon: "📱", expected: 7 },
  { id: "phone_count",       label: "手機點班", icon: "📞", expected: 7 },
  { id: "heating_lamp",      label: "烤燈", icon: "💡", expected: 1 }
];

// 每週二限定項目設定
const TUESDAY_ITEMS_CONFIG = [
  { id: "pumping_bag",       label: "輸血加壓器(Pumping Bag)", icon: "🩸", expected: 2 },
  { id: "garden_well",       label: "Garden Well", icon: "🧪", expected: 1 },
  { id: "o2_cylinder_small", label: "小桶氧氣桶", icon: "🟢", expected: 6 }
];

function defaultItems() {
  const o = {};
  FIXED_ITEMS_CONFIG.forEach(c => { o[c.id] = { count: 0, loanCount: 0, loanNote: "", bedNote: "" }; });
  TUESDAY_ITEMS_CONFIG.forEach(c => { o[c.id] = { count: 0, loanCount: 0, loanNote: "", bedNote: "" }; });
  return o;
}

function itemsFromRecord(rec) {
  const o = defaultItems();
  if (!rec || !rec.items) return o;
  (rec.items || []).forEach(it => {
    if (it && it.id && o[it.id]) o[it.id] = { loanCount: 0, loanNote: "", bedNote: "", ...it.value };
  });
  return o;
}

const SHIFTS      = ["白班", "小夜", "大夜"];
const SHIFT_PREV  = { "白班": "大夜", "小夜": "白班", "大夜": "小夜" };
const SHIFT_EMOJI = ["☀️", "🌙", "⭐"];

const P = {
  bg:"#F5F0FF", card:"#FFFFFF", pri:"#7C5CBF", priL:"#EDE9FF", priD:"#5A3E9B",
  teal:"#2DB9AA", tealL:"#E0FAF7", coral:"#FF6B6B", coralL:"#FFF0F0",
  mint:"#51CF66", mintL:"#EBFBEE", amber:"#FCC419", amberL:"#FFF9DB",
  orange:"#FF922B", orangeL:"#FFF4E6", muted:"#9E9AB5", border:"#E4DEFF",
  s0bg:"#EAF8FF", s0bd:"#4DABF7", s1bg:"#FFF8E1", s1bd:"#FFA94D", s2bg:"#F0E6FF", s2bd:"#9775FA",
};
const SBGS = [P.s0bg, P.s1bg, P.s2bg];
const SBDS = [P.s0bd, P.s1bd, P.s2bd];

let _audioCtx = null;
function getCtx() { if (!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return _audioCtx; }
function beep(freq, type, dur, vol=0.18, delay=0) {
  try {
    const ctx=getCtx(), o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type=type; o.frequency.value=freq;
    const t=ctx.currentTime+delay;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur+0.01);
  } catch {}
}
const SFX = {
  tap:    ()=>beep(880,"sine",0.06,0.12),
  toggle: ()=>beep(660,"sine",0.08,0.15),
  plus:    ()=>beep(740,"triangle",0.07,0.14),
  minus:  ()=>beep(440,"triangle",0.07,0.12),
  error:  (()=>{[0,0.2,0.4].forEach(d=>beep(180,"square",0.15,0.25,d));}),
  success:(()=>{[523,659,784,1046].forEach((f,i)=>beep(f,"sine",0.18,0.2,i*0.12));}),
  nav:    ()=>beep(600,"sine",0.05,0.1),
  delete: ()=>beep(300,"sawtooth",0.1,0.2),
  modal:  ()=>beep(440,"sine",0.1,0.15),
  loan:   ()=>beep(550,"triangle",0.12,0.18),
};

function validate(items, isTuesdayBigCheck) {
  const errors = [];
  
  // 常態點班 4 大項目嚴格防呆
  FIXED_ITEMS_CONFIG.forEach(cfg => {
    const v = items[cfg.id] || { count:0, loanCount:0, bedNote:"" };
    const effExpected = Math.max(0, cfg.expected - (v.loanCount || 0));
    if ((v.count||0) !== effExpected) {
      errors.push({ id:cfg.id, msg:`【${cfg.label}】數量不正確，必須剛好為 ${effExpected}（標準上限 ${cfg.expected} 扣除外借）` });
    }
    // 如果烤燈在場，但沒有選擇床號
    if (cfg.id === "heating_lamp" && (v.count || 0) > 0 && !v.bedNote) {
      errors.push({ id:cfg.id, msg:`【烤燈】目前在場使用中，請選擇正在使用的床號！` });
    }
  });

  // 週二限定項目防呆
  if (isTuesdayBigCheck) {
    TUESDAY_ITEMS_CONFIG.forEach(cfg => {
      const v = items[cfg.id] || { count:0, loanCount:0 };
      const effExpected = Math.max(0, cfg.expected - (v.loanCount || 0));
      if ((v.count||0) !== effExpected) {
        errors.push({ id:cfg.id, msg:`【${cfg.label}】數量不正確，必須剛好為 ${effExpected}（標準上限 ${cfg.expected} 扣除外借）` });
      }
    });
  }
  return errors;
}

function ShiftTag({ shift }) {
  const i = SHIFTS.indexOf(shift);
  return e("span", { style: { background:SBGS[i]||'#fff', color:SBDS[i]||'#333', border:`1.5px solid ${SBDS[i]||'#ccc'}`, borderRadius:20, padding:"2px 10px", fontSize:12, fontWeight:700 } }, `${SHIFT_EMOJI[i]||''} ${shift}`);
}

function Modal({ title, body, onClose, type="error" }) {
  const col = type==="error"?P.coral:type==="warn"?P.amber:P.mint;
  const bg  = type==="error"?P.coralL:type==="warn"?P.amberL:P.mintL;
  const ico = type==="error"?"🧠💥":type==="warn"?"⚠️":"🎉";
  useEffect(()=>{ SFX.modal(); },[]);
  return e("div", { style: { position:"fixed",inset:0,background:"#2008",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:24 } },
    e("div", { style: { background:P.card,borderRadius:24,padding:28,maxWidth:400,width:"100%",boxShadow:"0 16px 48px #4004",border:`2px solid ${col}44` } },
      e("div", { style: { textAlign:"center",fontSize:52,marginBottom:8 } }, ico),
      e("div", { style: { fontWeight:800,fontSize:18,color:col,textAlign:"center",marginBottom:14,lineHeight:1.3 } }, title),
      e("div", { style: { background:bg,borderRadius:14,padding:14,marginBottom:18,border:`1px solid ${col}55` } }, 
        typeof body==="string" ? e("p", { style: { margin:0,fontSize:14,lineHeight:1.9 } }, body) : body
      ),
      e("button", { onClick:()=>{ SFX.tap(); onClose(); }, style: { width:"100%",padding:15,borderRadius:16,border:"none",background:col,color:"#fff",fontWeight:800,fontSize:16,cursor:"pointer" } }, "我知道了 👍")
    )
  );
}

function ConfirmModal({ title, body, onConfirm, onCancel }) {
  useEffect(()=>{ SFX.modal(); },[]);
  return e("div", { style: { position:"fixed",inset:0,background:"#2008",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:24 } },
    e("div", { style: { background:P.card,borderRadius:24,padding:28,maxWidth:400,width:"100%",boxShadow:"0 16px 48px #4004" } },
      e("div", { style: { textAlign:"center",fontSize:48,marginBottom:8 } }, "🗑️"),
      e("div", { style: { fontWeight:800,fontSize:18,color:P.coral,textAlign:"center",marginBottom:12 } }, title),
      e("p", { style: { fontSize:14,color:P.muted,textAlign:"center",marginBottom:20 } }, body),
      e("div", { style: { display:"flex",gap:10 } },
        e("button", { onClick:()=>{ SFX.tap(); onCancel(); }, style: { flex:1,padding:13,borderRadius:14,border:`2px solid ${P.border}`,background:P.card,color:P.muted,fontWeight:700,fontSize:15,cursor:"pointer" } }, "取消"),
        e("button", { onClick:()=>{ SFX.delete(); onConfirm(); }, style: { flex:1,padding:13,borderRadius:14,border:"none",background:P.coral,color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer" } }, "確定刪除")
      )
    )
  );
}

function cBtn(bg, color, disabled=false) {
  return { width:36,height:36,borderRadius:9,background:disabled?"#E4DEFF":bg,color:disabled?P.muted:color,
    border:`2px solid ${disabled?P.border:P.pri}`,fontWeight:800,fontSize:20,cursor:disabled?"not-allowed":"pointer",lineHeight:1,transition:"all .1s",opacity:disabled?0.4:1 };
}

function LoanRow({ v, onChange, maxLoan, showBedSelect=false }) {
  const lc = v?.loanCount || 0;
  const showLoanNote = lc > 0;
  const showBedField = showBedSelect && (v.count || 0) > 0;

  return e("div", { style: { background:P.orangeL, borderRadius:12, padding:"10px 12px", marginBottom:0, border:`1.5px solid ${P.orange}44` } },
    e("div", { style: { display:"flex", alignItems:"center", gap:8, marginBottom: (showLoanNote || showBedField) ? 8 : 0 } },
      e("span", { style: { fontSize:14 } }, "🔄"),
      e("span", { style: { fontSize:13, fontWeight:700, color:P.orange, flex:1 } }, "外借／維修台數"),
      e("button", { onClick:()=>{ SFX.loan(); const nextLc = Math.max(0,lc-1); onChange({ ...v, loanCount:nextLc, count: Math.min(v.count, maxLoan - nextLc), loanNote: nextLc===0?"":v.loanNote }); }, style: cBtn(P.card, P.orange, lc===0) }, "−"),
      e("span", { style: { fontWeight:900,fontSize:20,minWidth:26,textAlign:"center",color:lc>0?P.orange:P.muted } }, lc),
      e("button", { onClick:()=>{ SFX.loan(); const nextLc = Math.min(lc+1, maxLoan); onChange({ ...v, loanCount:nextLc, count: Math.min(v.count, maxLoan - nextLc), bedNote: nextLc>0?"":v.bedNote }); }, style: cBtn(P.orange, "#fff", lc>=maxLoan) }, "+")
    ),
    showLoanNote && e("input", { value: v?.loanNote||"", onChange: e=>onChange({ ...v, loanNote:e.target.value }), placeholder: "📋 說明（如：外借加護 / 維修中）",
      style: { width:"100%",padding:"7px 10px",borderRadius:9,border:`1.5px solid ${P.orange}88`,fontSize:12,boxSizing:"border-box",outline:"none",background:"#fff",color:"#5a3000",marginBottom: showBedField ? 8 : 0 } }),
    
    showBedField && e("div", { style: { display: "flex", flexDirection: "column", gap: 4 } },
      e("label", { style: { fontSize: 11, fontWeight: 700, color: P.priD } }, "🛌 烤燈正在使用中，請點選床號："),
      e("select", { value: v?.bedNote||"", onChange: e=>onChange({ ...v, bedNote:e.target.value }),
        style: { width:"100%",padding:"7px 10px",borderRadius:9,border:`1.5px solid ${P.pri}88`,fontSize:13,boxSizing:"border-box",outline:"none",background:"#fff",color:"#2D2A4A",fontWeight: "bold" } },
        e("option", { value: "" }, "-- 請選擇單位 37 床之使用床號 --"),
        BEDS_LIST.map(b => e("option", { key: b, value: b }, b))
      )
    )
  );
}

// 嚴格計數元件（所有常態與大點項目均受硬性上限防呆鎖定）
function LockedCountItemRow({ cfg, value, onChange, hasError, showBedSelect=false }) {
  const v = value || { count: 0, loanCount: 0, loanNote: "", bedNote: "" };
  
  const effExpected = Math.max(0, cfg.expected - (v.loanCount || 0));
  const mismatch = (v.count || 0) !== effExpected;

  const disableMinus = (v.count || 0) <= 0 || (v.count || 0) <= effExpected;
  const disablePlus  = (v.count || 0) >= effExpected;

  return e("div", { style: { background:hasError?P.coralL:P.card,borderRadius:16,padding:"14px 14px 12px",marginBottom:10,border:`2px solid ${hasError?P.coral:P.border}`,boxShadow:"0 2px 8px #7C5CBF11" } },
    e("div", { style: { display:"flex",alignItems:"center",gap:8,marginBottom:10 } },
      e("span", { style: { fontSize:22 } }, cfg.icon),
      e("span", { style: { flex:1,fontWeight:700,fontSize:15,color:"#2D2A4A" } }, cfg.label),
      e("span", { style: { fontSize:12,fontWeight:700,padding:"3px 10px",borderRadius:20,background:mismatch?P.coralL:P.mintL,color:mismatch?P.coral:P.mint,border:`1px solid ${mismatch?P.coral:P.mint}55` } }, 
        `上限 ${cfg.expected} ${v.loanCount>0?`（扣外借後現場需為 ${effExpected}）`:""}`
      )
    ),
    e("div", { style: { display:"flex",alignItems:"center",justifyContent:"center",gap:16,padding:"6px 0",marginBottom:8 } },
      e("button", { onClick:()=>{ if(!disableMinus){ SFX.minus(); onChange({ ...v, count: (v.count||0)-1, bedNote: ((v.count||0)-1)===0?"":v.bedNote }); } }, style: cBtn(P.card, P.pri, disableMinus) }, "−"),
      e("div", { style: { textAlign:"center", minWidth:100 } },
        e("div", { style: { fontWeight:900,fontSize:38,color:mismatch?P.coral:P.mint,lineHeight:1 } }, v.count||0),
        e("div", { style: { fontSize:11,color:P.muted,marginTop:6,fontWeight:600 } }, mismatch ? `❌ 數量需等於 ${effExpected}` : "✓ 數量正確")
      ),
      e("button", { onClick:()=>{ if(!disablePlus){ SFX.plus(); onChange({ ...v, count: (v.count||0)+1 }); } }, style: cBtn(P.pri, P.card, disablePlus) }, "+")
    ),
    e("div", { style: { height:6,background:P.bg,borderRadius:8,overflow:"hidden",border:`1px solid ${P.border}`,marginBottom:12 } },
      e("div", { style: { height:"100%",width:`${Math.min((v.count||0)/Math.max(effExpected,1),1)*100}%`,background:mismatch?P.coral:P.mint,borderRadius:8,transition:"width .2s" } })
    ),
    e(LoanRow, { v: v, onChange: onChange, maxLoan: cfg.expected, showBedSelect: showBedSelect })
  );
}

function CheckboxItemRow({ label, icon, subtext, checked, onToggle, activeColor=P.mint, activeBg=P.mintL }) {
  return e("button", { 
    onClick: () => { SFX.toggle(); onToggle(); },
    style: { width: "100%", display: "flex", alignItems: "center", background: "#FFFFFF", border: `2px solid ${checked ? activeColor : '#E4DEFF'}`, borderRadius: "16px", padding: "16px", marginBottom: "12px", cursor: "pointer", transition: "all 0.15s ease", outline: "none", textAlign: "left" }
  },
    e("div", { width: "24px", height: "24px", style: { width: "24px", height: "24px", border: `2px solid ${checked ? activeColor : '#7C5CBF'}`, borderRadius: "6px", marginRight: "12px", display: "flex", alignItems: "center", justifycontent: "center", background: checked ? activeColor : "#fff", color: "#fff", fontWeight: "bold", fontSize: "16px", flexShrink: 0, textAlign: "center", lineheight: "20px" } }, checked ? "✓" : ""),
    e("div", { style: { flex: 1 } },
      e("span", { style: { fontSize: "16px", fontWeight: "700", color: "#2D2A4A", display: "block" } }, `${icon} ${label}`),
      subtext && e("span", { style: { fontSize: "12px", color: P.muted, marginTop: 2, display: "block", lineHeight: 1.4 } }, subtext)
    ),
    e("span", { style: { fontSize: "12px", fontWeight: "700", padding: "4px 10px", borderRadius: "20px", background: checked ? activeBg : P.coralL, color: checked ? activeColor : P.coral } }, checked ? "✓ 已完成" : "未勾選")
  );
}

function SyncingOverlay() {
  return e("div", { style: { position:"fixed",inset:0,background:"#2D2A4Acc",zIndex:9998,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20 } },
    e("div", { style: { width:64,height:64,border:`6px solid #ffffff33`,borderTop:`6px solid #fff`,borderRadius:"50%",animation:"spin .9s linear infinite" } }),
    e("div", { style: { color:"#fff",fontWeight:800,fontSize:17,animation:"pulse2 1.5s ease-in-out infinite" } }, "同步至雲端試算表中…"),
    e("div", { style: { color:"#ffffffaa",fontSize:13 } }, "請稍候，勿關閉頁面")
  );
}

const lbl = { fontSize:13,fontWeight:700,color:P.muted,display:"block" };
const inp = { width:"100%",padding:"10px 14px",borderRadius:12,marginTop:4,border:`1.5px solid ${P.border}`,fontSize:15,boxSizing:"border-box",outline:"none",background:P.bg };

function CheckForm({ records, onSave, onDone, onCancel, editRecord }) {
  const today = new Date().toISOString().split("T")[0];
  const [nurse,                   setNurse]                   = useState(editRecord?.nurse||"");
  const [date,                    setDate]                    = useState(editRecord?.date||today);
  const [shift,                   setShift]                   = useState(editRecord?.shift||null);
  const [items,                   setItems]                   = useState(editRecord?itemsFromRecord(editRecord):defaultItems());
  
  const [supplyComputerChecked, setSupplyComputerChecked] = useState(editRecord?.supplyComputerChecked || false);
  const [headNailChecked,       setHeadNailChecked]       = useState(editRecord?.headNailChecked || false);

  const [modal,   setModal]   = useState(null);
  const [saving,  setSaving]  = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [carried, setCarried] = useState(false);
  const [goAfter, setGoAfter] = useState(false);

  const isTuesday = new Date(date).getDay() === 2;
  const isTuesdayBigCheck = isTuesday && shift === "白班";

  function closeModal() { if (goAfter) { setModal(null); onDone(); } else setModal(null); }
  const isEdit = !!editRecord;

  function pickShift(s) {
    SFX.toggle(); setShift(s);
    if (!isEdit) {
      const prev = SHIFT_PREV[s];
      const prevRec = [...(records || [])].filter(r=>r&&r.shift===prev).sort((a,b)=>b.createdAt?.localeCompare(a.createdAt))[0];
      if (prevRec) { 
        setItems(itemsFromRecord(prevRec)); 
        setSupplyComputerChecked(prevRec.supplyComputerChecked || false);
        setHeadNailChecked(prevRec.headNailChecked || false);
        setCarried(true); 
        setTimeout(()=>setCarried(false),3500); 
      }
    }
  }

  function handleChange(id, val) { setItems(p=>({ ...p,[id]:val })); }

  async function submit() {
    if (!nurse.trim()) { SFX.error(); setModal({ type:"error",title:"請填寫護理師姓名",body:"姓名欄位不能空白！" }); return; }
    if (!shift)        { SFX.error(); setModal({ type:"error",title:"請選擇班別",body:"請先選擇本次點班的班別！" }); return; }
    
    const errs = validate(items, isTuesdayBigCheck);
    if (errs.length) {
      SFX.error();
      setModal({ type:"error",title:"數量防呆不通過 🧠💥",
        body: e("ul", { style: { margin:0,paddingLeft:18,lineHeight:2,fontSize:14 } }, errs.map((el,i)=>e("li", { key:i, style: { color:P.coral } }, el.msg))) });
      return;
    }

    setSaving(true);
    const record = {
      id: isEdit?editRecord.id:Date.now(), date, shift, nurse:nurse.trim(),
      supplyComputerChecked,
      headNailChecked: isTuesdayBigCheck ? headNailChecked : false,
      isTuesdayBigCheck,
      items: [
        ...FIXED_ITEMS_CONFIG.map(c=>({ id:c.id,label:c.label,value:items[c.id]||{ count:0,loanCount:0,loanNote:"",bedNote:"" } })),
        ...(isTuesdayBigCheck ? TUESDAY_ITEMS_CONFIG.map(c=>({ id:c.id,label:c.label,value:items[c.id]||{ count:0,loanCount:0,loanNote:"",bedNote:"" } })) : [])
      ],
      createdAt: isEdit?editRecord.createdAt:new Date().toISOString(), updatedAt: new Date().toISOString(),
    };

    await onSave(record, isEdit);
    SFX.success(); setSaving(false); setSyncing(true);
    try {
      const payload = {
        targetSheet: "5號車",
        nurse: record.nurse, date: record.date, shift: record.shift, submittedAt: record.updatedAt, isEdit,
        supplyComputer: record.supplyComputerChecked ? "已完成" : "未完成",
        headNail: isTuesdayBigCheck ? (record.headNailChecked ? "已打勾" : "未完成") : "非週二白班不需點",
        items: (record.items || []).map(it => {
          const v = it.value;
          const allCfg = [...FIXED_ITEMS_CONFIG, ...TUESDAY_ITEMS_CONFIG];
          const cfg = allCfg.find(c=>c.id===it.id);
          const exp = cfg ? cfg.expected : 0;
          return { id:it.id, label:it.label, count:v.count || 0, loanCount:v.loanCount || 0, loanNote:v.loanNote || "", bedNote:v.bedNote || "", note: v.bedNote ? `使用床號: ${v.bedNote}` : "", expected:exp };
        }),
      };
      await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
      setSyncing(false); SFX.success(); setGoAfter(true);
      setModal({ type:"success", title:"雲端同步成功 ☁️✅", body:"5號車點班資料已成功同步至雲端試算表！" });
    } catch (err) {
      setSyncing(false); SFX.error();
      setModal({ type:"warn", title:"雲端同步失敗 ⚠️", body:`本機紀錄儲存成功，但無法連線至雲端試算表。\n（${err.message}）` });
    }
  }

  const errIds = new Set(shift?validate(items, isTuesdayBigCheck).map(el=>el.id):[]);

  return e("div", { style: { paddingBottom:90 } },
    syncing && e(SyncingOverlay),
    modal && e(Modal, { type: modal.type, title: modal.title, body: modal.body, onClose: closeModal }),
    e("div", { style: { background:`linear-gradient(135deg,${P.pri} 0%,${P.teal} 100%)`,borderRadius:20,padding:"18px 20px",marginBottom:14,color:"#fff",boxShadow:`0 6px 20px ${P.pri}44` } },
      e("div", { style: { fontSize:28,marginBottom:4 } }, isEdit?"✏️":"🏥"),
      e("div", { style: { fontWeight:900,fontSize:20 } }, isEdit?"修改 5 號車紀錄":"5 號車點班"),
      e("div", { style: { fontSize:12,opacity:0.85,marginTop:2 } }, `8C神經外科病房 · 烤燈支援單位 37 床選單與極限防呆點班機制`)
    ),
    e("div", { style: { background:P.card,borderRadius:18,padding:16,marginBottom:12,boxShadow:"0 2px 12px #7C5CBF18",border:`1px solid ${P.border}` } },
      e("label", { style: lbl }, "👩‍⚕️ 護理師姓名 ", e("span", { style: { color: P.coral } }, "*")),
      e("input", { value: nurse, onChange: e=>setNurse(e.target.value), onClick: ()=>SFX.tap(), placeholder: "請輸入姓名", style: inp }),
      e("label", { style: { ...lbl, marginTop:12 } }, "📅 日期"),
      e("input", { type: "date", value: date, onChange: e=>setDate(e.target.value), style: inp }),
      e("label", { style: { ...lbl, marginTop:12 } }, "⏰ 班別 ", e("span", { style: { color: P.coral } }, "*")),
      e("div", { style: { display:"flex",gap:8,marginTop:6 } },
        SHIFTS.map((s,i)=>
          e("button", { key: s, onClick: ()=>pickShift(s), style: { flex:1,padding:"14px 0",borderRadius:14,fontWeight:700,fontSize:15,cursor:"pointer",border:`2.5px solid ${shift===s?SBDS[i]:P.border}`,background:shift===s?SBGS[i]:P.card, color:shift===s?SBDS[i]:P.muted,transition:"all .15s",boxShadow:shift===s?`0 4px 12px ${SBDS[i]}44`:"none" } }, `${SHIFT_EMOJI[i]} ${s}`)
        )
      ),
      carried && e("div", { style: { marginTop:10,padding:"9px 14px",background:"#E3FAFC",borderRadius:12,fontSize:13,color:"#0C8599",fontWeight:600,border:"1.5px solid #0C859944" } }, "✨ 已帶入上一班紀錄，請確認現場數量與烤燈使用床號"),
      isTuesdayBigCheck && e("div", { style: { marginTop:10,padding:"9px 14px",background:"#FFF9DB",borderRadius:12,fontSize:13,color:"#E67E22",fontWeight:600,border:"1.5px solid #FFA94D55" } }, "📅 偵測為【週二白班】，已自動加載每週大點項目。")
    ),
    
    e("div", { style: { background:P.card,borderRadius:18,padding:"14px 14px 4px",boxShadow:"0 2px 12px #7C5CBF18",marginBottom:14,border:`1px solid ${P.border}` } },
      e("div", { style: { fontWeight:800,fontSize:16,color:P.pri,marginBottom:12,display:"flex",alignItems:"center",gap:8 } },
        e("span", { style: { background:P.priL,borderRadius:10,padding:"4px 10px" } }, "📋 點班")
      ),
      
      e(CheckboxItemRow, {
        label: "供應室器械電腦點班",
        icon: "💻",
        subtext: "核對：縫合包*2、整形拆線包*3、換藥包*10、直尖短剪*8、氣切包*1",
        checked: supplyComputerChecked,
        onToggle: () => setSupplyComputerChecked(!supplyComputerChecked)
      }),

      FIXED_ITEMS_CONFIG.map(cfg=>
        e(LockedCountItemRow, { key: cfg.id, cfg: cfg, value: items[cfg.id], onChange: v=>handleChange(cfg.id,v), hasError: errIds.has(cfg.id), showBedSelect: cfg.id==="heating_lamp" })
      )
    ),

    isTuesdayBigCheck && e("div", { style: { background:P.card,borderRadius:18,padding:"14px 14px 4px",boxShadow:"0 2px 12px #FFA94D22",marginBottom:14,border:`2px solid ${P.amber}` } },
      e("div", { style: { fontWeight:800,fontSize:16,color:P.orange,marginBottom:12,display:"flex",alignItems:"center",gap:8 } },
        e("span", { style: { background:P.amberL,borderRadius:10,padding:"4px 10px" } }, "🗓️ 週二【白班限定】大點項目")
      ),
      
      TUESDAY_ITEMS_CONFIG.map(cfg=>
        e(LockedCountItemRow, { key: cfg.id, cfg: cfg, value: items[cfg.id], onChange: v=>handleChange(cfg.id,v), hasError: errIds.has(cfg.id), showBedSelect: false })
      ),

      e(CheckboxItemRow, {
        label: "頭釘釘子點班",
        icon: "📌",
        subtext: "備註：2週內過期需重新包消",
        checked: headNailChecked,
        onToggle: () => setHeadNailChecked(!headNailChecked),
        activeColor: P.orange,
        activeBg: P.orangeL
      })
    ),

    e("div", { style: { position:"fixed",bottom:0,left:0,right:0,padding:"12px 16px",background:P.card,borderTop:`1px solid ${P.border}`,display:"flex",gap:10,zIndex:50 } },
      e("button", { onClick: ()=>{ SFX.tap(); onCancel(); }, style: { flex:1,padding:14,borderRadius:14,border:`2px solid ${P.border}`,background:P.card,color:P.muted,fontWeight:700,fontSize:15,cursor:"pointer" } }, "取消"),
      e("button", { onClick: submit, disabled: saving||syncing, style: { flex:2.5,padding:14,borderRadius:14,border:"none",background:shift?`linear-gradient(135deg,${P.pri},${P.teal})`:P.muted,color:"#fff",fontWeight:800,fontSize:16,cursor:(saving||syncing)?"not-allowed":"pointer",opacity:(saving||syncing)?0.7:1,boxShadow:shift?`0 4px 14px ${P.pri}55`:"none" } }, 
        saving?"儲存中…":syncing?"同步中…":isEdit?"✅ 儲存修改":"✅ 完成5號車點班"
      )
    )
  );
}

function RecordCard({ record, onDelete, onEdit }) {
  const [open,    setOpen]    = useState(false);
  const [confirm, setConfirm] = useState(false);
  const hasBigCheck = record.isTuesdayBigCheck;

  return e("div", { style: { background:P.card,borderRadius:18,marginBottom:12,boxShadow:"0 2px 10px #7C5CBF15",overflow:"hidden",border:`1px solid ${P.border}` } },
    confirm && e(ConfirmModal, { title: "確定要刪除嗎？", body: "刪除後無法復原，請確認。", onConfirm: ()=>{ setConfirm(false); onDelete(record.id); }, onCancel: ()=>setConfirm(false) }),
    e("div", { onClick: ()=>{ SFX.tap(); setOpen(o=>!o); }, style: { padding:"13px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer" } },
      e("div", { style: { flex:1 } },
        e("div", { style: { fontWeight:700,fontSize:15,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap" } }, 
          record?.nurse || "未命名", " ", e(ShiftTag, { shift: record?.shift }),
          record?.updatedAt && record?.updatedAt!==record?.createdAt && e("span", { style: { fontSize:10,color:P.muted,background:P.bg,borderRadius:10,padding:"1px 6px" } }, "已修改")
        ),
        e("div", { style: { fontSize:12,color:P.muted,marginTop:2,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap" } }, 
          `📅 ${record?.date || ""}`,
          record?.supplyComputerChecked && e("span", { style: { background:P.mintL,color:P.mint,border:`1px solid ${P.mint}55`,borderRadius:12,padding:"1px 7px",fontSize:11,fontWeight:700 } }, "💻 供應室電腦已對"),
          hasBigCheck && record?.headNailChecked && e("span", { style: { background:P.orangeL,color:P.orange,border:`1px solid ${P.orange}55`,borderRadius:12,padding:"1px 7px",fontSize:11,fontWeight:700 } }, "📌 頭釘已確認"),
          hasBigCheck && e("span", { style: { background:"#FFF9DB",color:"#E67E22",border:"1px solid #FFA94D77",borderRadius:12,padding:"1px 7px",fontSize:11,fontWeight:700 } }, "🗓️ 週二大點")
        )
      ),
      e("span", { style: { color:P.muted,fontSize:18 } }, open?"▲":"▼")
    ),
    open && e("div", { style: { borderTop:`1px solid ${P.border}`,padding:"12px 16px" } },
      e("div", { style: { display:"flex",alignItems:"center",gap:6,padding:"7px 0",borderBottom:`1px solid ${P.border}` } },
        e("span", { style: { fontSize:15 } }, "💻"),
        e("span", { style: { fontWeight:700,fontSize:13,minWidth:120 } }, "供應室器械電腦點班"),
        e("span", { style: { color: record?.supplyComputerChecked?P.mint:P.coral,fontWeight:700,background:record?.supplyComputerChecked?P.mintL:P.coralL,borderRadius:10,padding:"2px 9px",fontSize:12 } }, record?.supplyComputerChecked?"✓ 已核對":"未勾選")
      ),
      hasBigCheck && e("div", { style: { display:"flex",alignItems:"center",gap:6,padding:"7px 0",borderBottom:`1px solid ${P.border}` } },
        e("span", { style: { fontSize:15 } }, "📌"),
        e("span", { style: { fontWeight:700,fontSize:13,minWidth:120 } }, "頭釘釘子點班"),
        e("span", { style: { color: record?.headNailChecked?P.orange:P.coral,fontWeight:700,background:record?.headNailChecked?P.orangeL:P.coralL,borderRadius:10,padding:"2px 9px",fontSize:12 } }, record?.headNailChecked?"✓ 已確認":"未勾選")
      ),
      (record?.items || []).map(it=>{
        if (!it) return null;
        const v=it.value, lc=v?.loanCount||0;
        const allCfg = [...FIXED_ITEMS_CONFIG, ...TUESDAY_ITEMS_CONFIG];
        const cfg = allCfg.find(c=>c.id===it.id);
        return e("div", { key: it.id, style: { display:"flex",alignItems:"center",gap:6,padding:"7px 0",borderBottom:`1px solid ${P.border}`,flexWrap:"wrap" } },
          e("span", { style: { fontSize:15 } }, cfg?.icon),
          e("span", { style: { fontWeight:700,fontSize:13,minWidth:120 } }, it.label),
          e("span", { style: { color:P.pri,fontWeight:700,background:P.priL,borderRadius:10,padding:"2px 9px",fontSize:12 } }, `在場 ${v.count||0} 台/支`),
          (it.id === "heating_lamp" && v.bedNote) && e("span", { style: { color:"#fff",fontWeight:700,background:P.pri,borderRadius:10,padding:"2px 9px",fontSize:12 } }, `🛌 使用床號: ${v.bedNote}`),
          lc > 0 && e("span", { style: { color:P.orange,fontWeight:700,background:P.orangeL,borderRadius:10,padding:"2px 9px",fontSize:12 } }, `外借/維修 ${lc} 台 (${v.loanNote || '無說明'})`)
        );
      }),
      e("div", { style: { display:'flex',gap:8,marginTop:12,justifyContent:'flex-end' } },
        e("button", { onClick: ()=>{ SFX.tap(); onEdit(record); }, style: { padding:"6px 12px",borderRadius:8,border:`1px solid ${P.pri}`,background:'#fff',color:P.pri,fontSize:13,fontWeight:700,cursor:'pointer' } }, "編輯"),
        e("button", { onClick: ()=>{ SFX.tap(); setConfirm(true); }, style: { padding:"6px 12px",borderRadius:8,border:'none',background:P.coral,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer' } }, "刪除")
      )
    )
  );
}

function App() {
  const [records, setRecords] = useState([]);
  const [view, setView] = useState("list");
  const [editRecord, setEditRecord] = useState(null);

  useEffect(() => { setRecords(loadRecords()); }, []);

  function handleSave(record, isEdit) {
    const currentRecords = records || [];
    const next = isEdit ? currentRecords.map(r => r && r.id === record.id ? record : r) : [record, ...currentRecords];
    setRecords(next); saveRecords(next);
    setView("list"); setEditRecord(null);
  }
  function handleDelete(id) { 
    const currentRecords = records || [];
    const next = currentRecords.filter(r => r && r.id !== id); 
    setRecords(next); saveRecords(next); 
  }

  return e("div", { style: { maxWidth: 600, margin: "0 auto", paddingBottom: 40 } },
    view === "list" 
      ? e("div", null,
          e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: 'wrap', gap: 10 } },
            e("h2", { style: { color: P.priD, fontWeight: 900 } }, "📋 5 號車點班歷史紀錄"),
            e("button", { onClick: () => { SFX.nav(); setEditRecord(null); setView("form"); }, style: { padding: "10px 18px", borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${P.pri}, ${P.teal})`, color: "#fff", fontWeight: 800, fontSize: 15, cursor: "pointer", boxShadow: "0 4px 12px rgba(124,92,191,0.3)" } }, "➕ 開始點班")
          ),
          (!records || records.length === 0)
            ? e("div", { style: { textAlign: "center", padding: "40px 20px", background: P.card, borderRadius: 18, color: P.muted, border: `1px solid ${P.border}` } },
                e("p", { style: { fontSize: 48, marginBottom: 8 } }, "📭"), e("p", { style: { fontWeight: 700 } }, "目前沒有 5 號車點班紀錄"), e("p", { style: { fontSize: 13, marginTop: 4 } }, "請點擊右上角按鈕開始。")
              )
            : records.map(r => r && r.id ? e(RecordCard, { key: r.id, record: r, onDelete: handleDelete, onEdit: (rec) => { SFX.nav(); setEditRecord(rec); setView("form"); } }) : null)
        )
      : e(CheckForm, { records: records, onSave: handleSave, onDone: () => { setView("list"); setEditRecord(null); }, onCancel: () => { SFX.nav(); setView("list"); setEditRecord(null); }, editRecord: editRecord })
  );
}

document.addEventListener("DOMContentLoaded", function() {
  try {
    const container = document.getElementById('root');
    if (container) {
      const root = ReactDOM.createRoot(container);
      root.render(e(App));
    }
  } catch (err) {
    console.error(err);
  }
});
</script>
</body>
</html>
